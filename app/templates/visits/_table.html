{% macro table(header=[], rows=[]) %}
<table class="table table-striped table-hover align-middle">
    <thead class="table-dark">
        <tr>
            {% if header %}
                {% for name in header %}
                    <th>{{ name }}</th>
                {% endfor %}
            {% endif %}
        </tr>
    </thead>
    <tbody>
        {% if rows %}
            {% for row in rows %}
            <tr>
                {% for element in row %}
                <td>{{ element }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="4" class="text-center py-4 text-muted">
                    Записей пока нет
                </td>
            </tr>
        {% endif %}
    </tbody>
</table>

{% endmacro %}
