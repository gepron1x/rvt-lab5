{% extends "base.html" %}

{% from "visits/_table.html" import table %}

{% block title %}{{ report_title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>{{ report_title }}</h2>
    </div>

    <div class="table-responsive">
        {{ table(header=header, rows=rows) }}
    </div>

    <div>
        <a href="{{ url_for('visits.export_csv', report_type=report_type) }}" class="btn btn-outline-primary me-2">
                Экспорт в csv
            </a>
    </div>

</div>
{% endblock %}
