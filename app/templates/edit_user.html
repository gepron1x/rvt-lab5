{% extends "base.html" %}
{% from "_form.html" import user_form %}

{% block title %}Редактирование пользователя{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Редактирование: @{{ user.username }}</h2>
        <div class="card shadow-sm p-4">
            {{ user_form(user=user, roles=roles, errors=errors, is_edit=True, is_admin=is_admin) }}
        </div>
    </div>
</div>
{% endblock %}
